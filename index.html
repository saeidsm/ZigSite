<html lang="fa" dir="rtl">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>نانوپوشش طیف‌گزین زیگورات | عایق حرارتی نانو برای شیشه ساختمان</title>
    <meta name="description" content="نانوپوشش طیف‌گزین زیگورات؛ سپر نامرئی ساختمان در برابر گرما. سد مادون‌قرمز و اشعه فرابنفش، عبور نور مرئی، و کاهش تا ۳۰٪ در مصرف انرژی بدون تعویض شیشه." />

    <!-- Set theme before paint to avoid flash: localStorage, else prefers-color-scheme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('zz-theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

    <!-- Caching & Performance -->
    <meta http-equiv="Cache-Control" content="max-age=31536000, public" />
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Vazirmatn', 'sans-serif'],
            },
            // Design tokens — bound to CSS variables in index.css so they follow the active theme.
            colors: {
              bg: 'var(--bg)',
              'bg-2': 'var(--bg2)',
              surface: 'var(--surface)',
              ink: 'var(--ink)',
              muted: 'var(--muted)',
              rule: 'var(--rule)',
              onyx: 'var(--onyx)',
              accent: {
                DEFAULT: 'var(--accent)',
                strong: 'var(--accent-strong)',
                ink: 'var(--accent-ink)',
                soft: 'var(--accent-soft)',
              },
            },
            borderRadius: {
              card: '26px',
              pill: '100px',
            },
          },
        },
      };
    </script>
